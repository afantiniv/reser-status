name: Response Time CI
on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:
jobs:
  response-time:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: upptime/response-time@v1.1.0
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
